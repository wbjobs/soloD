<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气象粒子系统 - 历史回放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
            min-width: 250px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #info-panel h2 {
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        .station-info {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }
        .station-info h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #4fc3f7;
        }
        .station-info p {
            font-size: 12px;
            margin: 4px 0;
            color: #ccc;
        }
        #particle-detail {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            z-index: 200;
            display: none;
            min-width: 300px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #particle-detail h3 {
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
        }
        #particle-detail p {
            margin: 10px 0;
            font-size: 14px;
        }
        #particle-detail .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 24px;
            color: #888;
        }
        #particle-detail .close-btn:hover {
            color: white;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-connected {
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        .status-disconnected {
            background: #f44336;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        #instructions {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 100;
        }
        #timeline-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #timeline-container h3 {
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mode-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-live {
            background: #4caf50;
            color: white;
        }
        .mode-playback {
            background: #ff9800;
            color: white;
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #4fc3f7;
            color: white;
        }
        .btn-primary:hover {
            background: #0288d1;
        }
        .btn-success {
            background: #4caf50;
            color: white;
        }
        .btn-success:hover {
            background: #388e3c;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .timeline-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4fc3f7;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(79, 195, 247, 0.5);
            transition: transform 0.2s;
        }
        .timeline-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .time-display {
            color: white;
            font-size: 13px;
            min-width: 100px;
            text-align: center;
            font-family: monospace;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #81c784);
            width: 0%;
            transition: width 0.1s;
        }
        .buffer-info {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 11px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info-panel">
        <h2><span class="status-indicator status-disconnected" id="status-indicator"></span>气象数据面板</h2>
        <div id="stations-container"></div>
    </div>
    
    <div id="particle-detail">
        <span class="close-btn" id="close-detail">&times;</span>
        <h3>粒子详情</h3>
        <div id="detail-content"></div>
    </div>
    
    <div id="timeline-container">
        <h3>
            <span>流体轨迹历史回放</span>
            <span class="mode-badge mode-live" id="mode-badge">实时模式</span>
        </h3>
        <div class="controls-row">
            <button class="btn btn-primary" id="btn-load">加载历史</button>
            <button class="btn btn-success" id="btn-toggle" disabled>开始回放</button>
            <span class="time-display" id="time-display">00:00 / 00:00</span>
            <input type="range" class="timeline-slider" id="timeline-slider" min="0" max="0" value="0" disabled>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="buffer-info">
            <span>缓存帧数: <span id="frame-count">0</span></span>
            <span>回放速度: 5x</span>
        </div>
    </div>
    
    <div id="instructions">
        鼠标拖拽旋转视角 | 滚轮缩放 | 点击粒子查看详情
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
