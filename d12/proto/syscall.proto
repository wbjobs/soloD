syntax = "proto3";

package syscallmonitor;

option go_package = "./proto";

message SyscallEvent {
    uint32 pid = 1;
    string process_name = 2;
    string syscall_name = 3;
    string args = 4;
    int64 timestamp = 5;
}

message AgentInfo {
    string agent_id = 1;
    uint32 target_pid = 2;
}

service SyscallCollector {
    rpc StreamSyscalls(stream SyscallEvent) returns (StreamResponse);
}

message StreamResponse {
    bool success = 1;
    string message = 2;
    int64 received_count = 3;
}
