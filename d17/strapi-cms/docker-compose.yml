version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: strapi-mysql
    restart: unless-stopped
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: strapi123
      MYSQL_DATABASE: strapi_cms
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pstrapi123"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build: .
    container_name: strapi-cms
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: strapi_cms
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi123
      DATABASE_SSL: "false"
      APP_KEYS: randomKey1,randomKey2,randomKey3,randomKey4
      API_TOKEN_SALT: randomSalt1234567890
      ADMIN_JWT_SECRET: randomJwtSecret1234567890
      TRANSFER_TOKEN_SALT: randomTransferSalt1234567890
      JWT_SECRET: randomJwtSecret1234567890
    ports:
      - "1337:1337"
    volumes:
      - ./:/srv/app
      - /srv/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
