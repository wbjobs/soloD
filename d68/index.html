<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可破坏体素世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            z-index: 100;
        }
        
        #info h3 {
            margin-bottom: 10px;
            color: #4fc3f7;
        }
        
        #voxel-count {
            color: #81c784;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>💥 爆炸体素世界</h3>
        <p>🖱️ 点击体素触发爆炸</p>
        <p>💨 爆炸范围: 半径 1.5</p>
        <p>🖱️ 鼠标拖拽旋转视角</p>
        <p>剩余体素: <span id="voxel-count">125</span></p>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
