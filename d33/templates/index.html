<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Log Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }

        .header {
            background-color: #2d2d30;
            padding: 15px 30px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #569cd6;
            font-size: 24px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #4ec9b0;
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background-color: #f14c4c;
            animation: none;
        }

        .status-indicator.reconnecting {
            background-color: #cca700;
            animation: blink 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .sidebar {
            width: 300px;
            background-color: #252526;
            border-right: 1px solid #3e3e42;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #569cd6;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .stat-box {
            background-color: #2d2d30;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .stat-label {
            font-size: 12px;
            color: #858585;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .alerts-section {
            margin-top: 20px;
        }

        .alert-item {
            background-color: #3a2222;
            border-left: 4px solid #f14c4c;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .alert-item:hover {
            background-color: #4a2a2a;
        }

        .alert-time {
            font-size: 11px;
            color: #858585;
            margin-bottom: 5px;
        }

        .alert-keywords {
            font-size: 12px;
            color: #f14c4c;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .alert-preview {
            font-size: 12px;
            color: #d4d4d4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alert-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 11px;
            background-color: #0e639c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-small:hover {
            background-color: #1177bb;
        }

        .btn-download {
            background-color: #3c763d;
        }

        .btn-download:hover {
            background-color: #449d44;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            background-color: #2d2d30;
            padding: 10px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #1177bb;
        }

        .btn-danger {
            background-color: #c42b1c;
        }

        .btn-danger:hover {
            background-color: #d63b2b;
        }

        .filter-input {
            flex: 1;
            max-width: 300px;
            padding: 8px 12px;
            background-color: #3c3c3c;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
        }

        .logs-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .log-entry {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 4px;
            border-left: 4px solid #555;
            background-color: #2d2d30;
            animation: fadeIn 0.3s ease;
            word-break: break-all;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry.stderr {
            border-left-color: #f14c4c;
            background-color: #3a2222;
        }

        .log-entry.stdout {
            border-left-color: #4ec9b0;
        }

        .log-timestamp {
            color: #808080;
            margin-right: 10px;
        }

        .log-stream {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 8px;
            font-weight: bold;
        }

        .log-stream.stdout {
            background-color: #1e4d48;
            color: #4ec9b0;
        }

        .log-stream.stderr {
            background-color: #4d1e1e;
            color: #f14c4c;
        }

        .reconnect-notice {
            position: fixed;
            top: 80px;
            right: 20px;
            background-color: #cca700;
            color: #1e1e1e;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            background-color: #252526;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 1000px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3e3e42;
        }

        .modal-header h2 {
            color: #569cd6;
            font-size: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #d4d4d4;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-info {
            background-color: #2d2d30;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .modal-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .modal-info strong {
            color: #569cd6;
        }

        .context-logs {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .context-log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }

        .context-log-entry.highlight {
            background-color: #3a2222;
            border-left: 3px solid #f14c4c;
            padding-left: 10px;
            margin-left: -10px;
        }

        .no-alerts {
            text-align: center;
            color: #858585;
            padding: 20px;
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐳 Docker Log Monitor Dashboard</h1>
        <div class="connection-status">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="connectionStatus">已连接</span>
        </div>
    </div>

    <div class="reconnect-notice" id="reconnectNotice">
        连接断开，正在尝试重连...
    </div>

    <div class="container">
        <div class="sidebar">
            <h3>📊 统计信息</h3>
            <div class="stat-box">
                <div class="stat-label">总日志数</div>
                <div class="stat-value" id="totalLogs">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Stdout 日志</div>
                <div class="stat-value" id="stdoutLogs" style="color: #4ec9b0;">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Stderr 日志</div>
                <div class="stat-value" id="stderrLogs" style="color: #f14c4c;">0</div>
            </div>

            <div class="alerts-section">
                <h3>⚠️ 告警历史 (<span id="alertCount">0</span>)</h3>
                <div id="alertsList">
                    <div class="no-alerts">暂无告警</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <button class="btn" onclick="clearLogs()">🗑️ 清空日志</button>
                <button class="btn btn-danger" onclick="scrollToBottom()">⬇️ 滚动到底部</button>
                <input type="text" class="filter-input" id="filterInput" placeholder="过滤日志..." oninput="filterLogs()">
            </div>

            <div class="logs-container" id="logsContainer">
            </div>
        </div>
    </div>

    <div class="modal" id="alertModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 告警上下文详情</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-info" id="modalInfo">
            </div>
            <div class="context-logs" id="contextLogs">
            </div>
            <div class="modal-actions" style="margin-top: 20px; text-align: right;">
                <button class="btn btn-download" id="downloadBtn" onclick="downloadContext()">📥 下载日志包</button>
            </div>
        </div>
    </div>

    <script>
        let totalLogs = 0;
        let stdoutLogs = 0;
        let stderrLogs = 0;
        let filterText = '';
        let ws = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 50;
        let reconnectInterval = null;
        let isManualClose = false;
        let alerts = [];
        let currentAlertId = null;

        function init() {
            loadInitialLogs();
            loadInitialAlerts();
            connectWebSocket();
        }

        function loadInitialLogs() {
            fetch('/api/logs')
                .then(response => response.json())
                .then(data => {
                    data.logs.forEach(log => addLogEntry(log));
                    updateStats();
                })
                .catch(err => console.error('Failed to load initial logs:', err));
        }

        function loadInitialAlerts() {
            fetch('/api/alerts')
                .then(response => response.json())
                .then(data => {
                    alerts = data.alerts;
                    renderAlerts();
                })
                .catch(err => console.error('Failed to load initial alerts:', err));
        }

        function connectWebSocket() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/ws`;

            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('WebSocket connected');
                reconnectAttempts = 0;
                updateConnectionStatus('connected');
                hideReconnectNotice();
            };

            ws.onclose = function(event) {
                console.log('WebSocket disconnected', event);
                updateConnectionStatus('disconnected');
                
                if (!isManualClose) {
                    showReconnectNotice();
                    scheduleReconnect();
                }
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'log' && data.data) {
                        addLogEntry(data.data);
                        updateStats();
                    } else if (data.type === 'alert' && data.data) {
                        handleAlert(data.data);
                    }
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function scheduleReconnect() {
            if (reconnectInterval) {
                return;
            }

            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
            
            reconnectInterval = setTimeout(() => {
                reconnectInterval = null;
                reconnectAttempts++;
                
                if (reconnectAttempts <= maxReconnectAttempts) {
                    console.log(`Reconnecting... Attempt ${reconnectAttempts}/${maxReconnectAttempts}`);
                    updateConnectionStatus('reconnecting');
                    connectWebSocket();
                } else {
                    console.log('Max reconnect attempts reached');
                    document.getElementById('connectionStatus').textContent = '重连失败，请刷新页面';
                }
            }, delay);
        }

        function updateConnectionStatus(status) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('connectionStatus');

            indicator.className = 'status-indicator ' + status;

            switch (status) {
                case 'connected':
                    statusText.textContent = '已连接';
                    break;
                case 'disconnected':
                    statusText.textContent = '已断开';
                    break;
                case 'reconnecting':
                    statusText.textContent = '重连中...';
                    break;
            }
        }

        function showReconnectNotice() {
            document.getElementById('reconnectNotice').style.display = 'block';
        }

        function hideReconnectNotice() {
            document.getElementById('reconnectNotice').style.display = 'none';
        }

        function handleAlert(alert) {
            alerts.unshift(alert);
            if (alerts.length > 100) {
                alerts.pop();
            }
            renderAlerts();
        }

        function renderAlerts() {
            const container = document.getElementById('alertsList');
            document.getElementById('alertCount').textContent = alerts.length;

            if (alerts.length === 0) {
                container.innerHTML = '<div class="no-alerts">暂无告警</div>';
                return;
            }

            container.innerHTML = alerts.slice(0, 50).map(alert => `
                <div class="alert-item" onclick="showAlertDetail('${alert.id}')">
                    <div class="alert-time">${formatTime(alert.trigger_time)}</div>
                    <div class="alert-keywords">${alert.keywords.join(', ')}</div>
                    <div class="alert-preview">${escapeHtml(alert.message).substring(0, 100)}...</div>
                    <div class="alert-actions">
                        <button class="btn-small" onclick="event.stopPropagation(); showAlertDetail('${alert.id}')">👁 查看</button>
                        <button class="btn-small btn-download" onclick="event.stopPropagation(); downloadAlert('${alert.id}')">📥 下载</button>
                    </div>
                </div>
            `).join('');
        }

        function formatTime(timeStr) {
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function addLogEntry(log) {
            const container = document.getElementById('logsContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${log.stream_type}`;
            
            const streamClass = log.stream_type === 'stderr' ? 'stderr' : 'stdout';
            const streamLabel = log.stream_type === 'stderr' ? 'STDERR' : 'STDOUT';
            
            entry.innerHTML = `
                <span class="log-timestamp">${log.timestamp || new Date().toISOString()}</span>
                <span class="log-stream ${streamClass}">${streamLabel}</span>
                <span class="log-message">${escapeHtml(log.message)}</span>
            `;
            
            entry.style.display = shouldShowLog(log.message) ? 'block' : 'none';
            container.appendChild(entry);
            
            totalLogs++;
            if (log.stream_type === 'stderr') {
                stderrLogs++;
            } else {
                stdoutLogs++;
            }
            
            const maxEntries = 1000;
            while (container.children.length > maxEntries) {
                container.removeChild(container.firstChild);
            }
        }

        function shouldShowLog(message) {
            if (!filterText) return true;
            return message.toLowerCase().includes(filterText.toLowerCase());
        }

        function updateStats() {
            document.getElementById('totalLogs').textContent = totalLogs;
            document.getElementById('stdoutLogs').textContent = stdoutLogs;
            document.getElementById('stderrLogs').textContent = stderrLogs;
        }

        function clearLogs() {
            document.getElementById('logsContainer').innerHTML = '';
            totalLogs = 0;
            stdoutLogs = 0;
            stderrLogs = 0;
            updateStats();
        }

        function scrollToBottom() {
            const container = document.getElementById('logsContainer');
            container.scrollTop = container.scrollHeight;
        }

        function filterLogs() {
            filterText = document.getElementById('filterInput').value;
            const entries = document.querySelectorAll('.log-entry');
            entries.forEach(entry => {
                const message = entry.querySelector('.log-message').textContent;
                entry.style.display = shouldShowLog(message) ? 'block' : 'none';
            });
        }

        function showAlertDetail(alertId) {
            currentAlertId = alertId;
            
            fetch(`/api/alerts/${alertId}`)
                .then(response => response.json())
                .then(data => {
                    const alert = data.alert;
                    const logs = data.logs;

                    const modalInfo = document.getElementById('modalInfo');
                    modalInfo.innerHTML = `
                        <p><strong>告警 ID:</strong> ${alert.id}</p>
                        <p><strong>触发时间:</strong> ${formatTime(alert.trigger_time)}</p>
                        <p><strong>匹配关键字:</strong> ${alert.keywords.join(', ')}</p>
                        <p><strong>容器 ID:</strong> ${alert.container_id}</p>
                        <p><strong>日志流:</strong> ${alert.stream_type}</p>
                        <p><strong>上下文范围:</strong> ${formatTime(alert.context_start)} ~ ${formatTime(alert.context_end)}</p>
                        <p><strong>上下文日志数:</strong> ${logs.length} 条</p>
                    `;

                    const contextLogs = document.getElementById('contextLogs');
                    contextLogs.innerHTML = logs.map(log => `
                        <div class="context-log-entry ${log.id === alert.id ? 'highlight' : ''}">
                            <span style="color: #808080;">[${log.timestamp}]</span>
                            <span style="color: ${log.stream_type === 'stderr' ? '#f14c4c' : '#4ec9b0'}; font-weight: bold;">[${log.stream_type.toUpperCase()}]</span>
                            ${escapeHtml(log.message)}
                        </div>
                    `).join('');

                    document.getElementById('alertModal').style.display = 'block';
                })
                .catch(err => console.error('Failed to load alert detail:', err));
        }

        function closeModal() {
            document.getElementById('alertModal').style.display = 'none';
            currentAlertId = null;
        }

        function downloadContext() {
            if (currentAlertId) {
                downloadAlert(currentAlertId);
            }
        }

        function downloadAlert(alertId) {
            window.open(`/api/alerts/${alertId}/download`, '_blank');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = init;

        window.onbeforeunload = function() {
            isManualClose = true;
            if (ws) {
                ws.close();
            }
        };

        window.onclick = function(event) {
            const modal = document.getElementById('alertModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
