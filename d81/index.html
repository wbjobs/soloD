<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P 视频传输系统 - WebCodecs + WebGL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #eee;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .control-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .control-row {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    label {
      font-weight: 500;
      min-width: 80px;
    }

    input[type="text"] {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      min-width: 150px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00d4ff;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .peer-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .peer-item {
      padding: 8px 16px;
      background: rgba(123, 44, 191, 0.3);
      border-radius: 20px;
      border: 1px solid rgba(123, 44, 191, 0.5);
      cursor: pointer;
      transition: all 0.2s;
    }

    .peer-item:hover {
      background: rgba(123, 44, 191, 0.5);
    }

    .video-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .video-box {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .video-box h3 {
      margin-bottom: 15px;
      font-size: 16px;
      color: #00d4ff;
    }

    canvas {
      width: 100%;
      height: 400px;
      background: #000;
      border-radius: 8px;
    }

    .status-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-panel h3 {
      margin-bottom: 15px;
      color: #7b2cbf;
    }

    #statusLog {
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
    }

    .log-entry {
      margin-bottom: 5px;
      padding: 3px 0;
    }

    .log-info {
      color: #00d4ff;
    }

    .log-success {
      color: #00ff88;
    }

    .log-error {
      color: #ff4757;
    }

    .log-warning {
      color: #ffa502;
    }

    .network-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat-item label {
      font-size: 12px;
      color: #888;
      min-width: unset;
    }

    .stat-item span {
      font-size: 18px;
      font-weight: 600;
      color: #00d4ff;
    }

    .svc-layer {
      display: inline-block;
      padding: 4px 12px;
      background: linear-gradient(135deg, #7b2cbf, #00d4ff);
      border-radius: 12px;
      font-weight: 700;
    }

    .svc-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .svc-controls label {
      font-size: 14px;
      color: #888;
    }

    .layer-btn {
      padding: 10px 16px;
      border: 2px solid rgba(123, 44, 191, 0.3);
      border-radius: 8px;
      background: rgba(123, 44, 191, 0.1);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .layer-btn:hover {
      background: rgba(123, 44, 191, 0.3);
      border-color: #7b2cbf;
    }

    .layer-btn.active {
      background: linear-gradient(135deg, #7b2cbf, #00d4ff);
      border-color: #00d4ff;
    }

    .layer-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .video-container {
        grid-template-columns: 1fr;
      }
      .network-stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>P2P 视频传输系统</h1>

    <div class="control-panel">
      <div class="control-row">
        <label>用户ID:</label>
        <input type="text" id="userId" placeholder="输入你的用户ID" value="user1">
        <button id="registerBtn">注册</button>
        <button id="getPeersBtn">刷新列表</button>
      </div>
      <div class="control-row">
        <label>在线用户:</label>
        <div class="peer-list" id="peerList">
          <span style="color: #888;">暂无在线用户</span>
        </div>
      </div>
      <div class="control-row">
        <label>呼叫用户:</label>
        <input type="text" id="targetUserId" placeholder="输入目标用户ID">
        <button id="callBtn" disabled>发起呼叫</button>
        <button id="hangupBtn" disabled>挂断</button>
        <button id="recoverBtn" disabled>手动恢复</button>
      </div>
    </div>

    <div class="status-panel">
      <h3>网络状态与 SVC 控制</h3>
      <div class="network-stats">
        <div class="stat-item">
          <label>当前码率:</label>
          <span id="bitrateValue">0 kbps</span>
        </div>
        <div class="stat-item">
          <label>丢包率:</label>
          <span id="packetLossValue">0%</span>
        </div>
        <div class="stat-item">
          <label>抖动(Jitter):</label>
          <span id="jitterValue">0 ms</span>
        </div>
        <div class="stat-item">
          <label>往返时间(RTT):</label>
          <span id="rttValue">0 ms</span>
        </div>
        <div class="stat-item">
          <label>当前 SVC 层:</label>
          <span id="svcLayerValue" class="svc-layer">L1</span>
        </div>
        <div class="stat-item">
          <label>分辨率:</label>
          <span id="resolutionValue">640x480</span>
        </div>
      </div>
      
      <div class="svc-controls">
        <label>手动切换 SVC 层:</label>
        <button id="layerL0" class="layer-btn">L0 (320x240 低)</button>
        <button id="layerL1" class="layer-btn active">L1 (640x480 中)</button>
        <button id="layerL2" class="layer-btn">L2 (1280x720 高)</button>
      </div>
    </div>

    <div class="video-container">
      <div class="video-box">
        <h3>本地视频 (预览)</h3>
        <canvas id="localCanvas"></canvas>
      </div>
      <div class="video-box">
        <h3>远程视频 (WebCodecs + WebGL)</h3>
        <canvas id="remoteCanvas"></canvas>
      </div>
    </div>

    <div class="status-panel">
      <h3>状态日志</h3>
      <div id="statusLog"></div>
    </div>
  </div>

  <script src="udp-signaling.js"></script>
  <script src="webgl-renderer.js"></script>
  <script src="video-decoder.js"></script>
  <script src="webrtc-manager.js"></script>
  <script src="app.js"></script>
</body>
</html>
